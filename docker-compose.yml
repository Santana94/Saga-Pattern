version: '3.8'

services:
  kafka:
    image: apache/kafka-native
    ports:
      - "9092:9092"
    environment:
      # Configure listeners for both docker and host communication
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # Settings required for KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091

      # Listener to use for broker-to-broker communication
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      # Required for a single node cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "echo 'healthy'" ]
      interval: 10s
      timeout: 10s
      retries: 5

  order_db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db
    ports:
      - "15432:5432"   # maps container 5432 to host 15432
    volumes:
      - order_db_data:/var/lib/postgresql/data

  payment_db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "15433:5432"   # maps container 5432 to host 15433
    volumes:
      - payment_db_data:/var/lib/postgresql/data

  delivery_db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: delivery_db
    ports:
      - "15434:5432"   # maps container 5432 to host 15434
    volumes:
      - delivery_db_data:/var/lib/postgresql/data

  saga_db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saga_db
    ports:
      - "15435:5432"   # maps container 5432 to host 15435
    volumes:
      - saga_db_data:/var/lib/postgresql/data

  order_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: order_service
    depends_on:
      - order_db
      - kafka
    ports:
      - "8000:8000"
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9093
      - DB_HOST=order_db

  payment_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: payment_service
    depends_on:
      - payment_db
      - kafka
    ports:
      - "8001:8000"
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9093
      - DB_HOST=payment_db

  delivery_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: delivery_service
    depends_on:
      - delivery_db
      - kafka
    ports:
      - "8002:8000"
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9093
      - DB_HOST=delivery_db

  saga_view:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: saga_view
    depends_on:
      - saga_db
      - kafka
    ports:
      - "8003:8000"
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9093
      - DB_HOST=saga_db


volumes:
  order_db_data:
  payment_db_data:
  delivery_db_data:
  saga_db_data:
